services:
  - type: web
    name: senbonsplans
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: APP_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ORANGE_MONEY_API_URL
        sync: false
      - key: ORANGE_MONEY_API_KEY
        sync: false
      - key: ORANGE_MONEY_WEBHOOK_SECRET
        sync: false
      - key: WAVE_API_URL
        sync: false
      - key: WAVE_API_KEY
        sync: false
      - key: WAVE_WEBHOOK_SECRET
        sync: false
      - key: FREE_MONEY_API_URL
        sync: false
      - key: FREE_MONEY_API_KEY
        sync: false
      - key: FREE_MONEY_WEBHOOK_SECRET
        sync: false
      - key: LOCAL_ADMIN_USERNAME
        sync: false
      - key: LOCAL_ADMIN_PASSWORD
        sync: false
